<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SCADA Tank</title>

<style>

body{
    background:#07131f;
    margin:0;
    padding:30px;
    font-family:Segoe UI;
    color:white;
}

svg{
    width:100%;
    max-width:1200px;
}

#water{
    transition:all 1s ease;
}

.flow{
    stroke-dasharray:12;
    animation:flow 1s linear infinite;
}

@keyframes flow{
    to{
        stroke-dashoffset:-24;
    }
}

.pump-rotate{
    animation:spin 2s linear infinite;
    transform-origin:center;
    transform-box:fill-box;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<h2>SCADA WATER TANK</h2>

<svg viewBox="0 0 1200 600">

<!-- PIPE -->

<line
x1="430"
y1="300"
x2="1020"
y2="300"
stroke="#cfd8dc"
stroke-width="18"
stroke-linecap="round"
/>

<line
class="flow"
x1="430"
y1="300"
x2="1020"
y2="300"
stroke="#00e5ff"
stroke-width="4"
/>

<!-- TANK -->

<ellipse
cx="220"
cy="120"
rx="120"
ry="35"
fill="#1f2d3a"
stroke="#8cb4ff"
stroke-width="4"
/>

<rect
x="100"
y="120"
width="240"
height="250"
fill="#162433"
stroke="#8cb4ff"
stroke-width="4"
/>

<ellipse
cx="220"
cy="370"
rx="120"
ry="35"
fill="#162433"
stroke="#8cb4ff"
stroke-width="4"
/>

<!-- WATER -->

<clipPath id="tankClip">
    <rect
    x="100"
    y="120"
    width="240"
    height="250"/>
</clipPath>

<g clip-path="url(#tankClip)">
    <rect
    id="water"
    x="100"
    y="220"
    width="240"
    height="200"
    fill="#2196f3"/>
</g>

<!-- TANK LABEL -->

<text
x="220"
y="255"
text-anchor="middle"
fill="white"
font-size="30"
font-weight="bold"
id="levelText">
75%
</text>

<!-- OUTLET -->

<rect
x="340"
y="285"
width="90"
height="30"
fill="#cfd8dc"
/>

<!-- VALVE -->

<g id="valve">

<circle
cx="520"
cy="300"
r="45"
fill="#d32f2f"
stroke="#eceff1"
stroke-width="4"
/>

<line
x1="490"
y1="270"
x2="550"
y2="330"
stroke="white"
stroke-width="6"
/>

<line
x1="550"
y1="270"
x2="490"
y2="330"
stroke="white"
stroke-width="6"
/>

<rect
x="512"
y="210"
width="16"
height="50"
fill="#eceff1"
/>

<circle
cx="520"
cy="190"
r="25"
fill="#ffca28"
/>

</g>

<!-- PUMP -->

<g id="pump">

<!-- housing -->

<path
d="
M700 250
Q740 220 780 250
L820 250
Q860 250 860 300
Q860 350 820 350
L780 350
Q740 380 700 350
Q660 350 660 300
Q660 250 700 250
"
fill="#1565c0"
stroke="#eceff1"
stroke-width="4"
/>

<!-- impeller -->

<circle
cx="760"
cy="300"
r="45"
fill="#0d47a1"
/>

<g id="impeller" class="pump-rotate">

<line x1="760" y1="260" x2="760" y2="340"
stroke="white" stroke-width="5"/>

<line x1="720" y1="300" x2="800" y2="300"
stroke="white" stroke-width="5"/>

<line x1="732" y1="272" x2="788" y2="328"
stroke="white" stroke-width="5"/>

<line x1="788" y1="272" x2="732" y2="328"
stroke="white" stroke-width="5"/>

</g>

<!-- motor -->

<rect
x="860"
y="250"
width="110"
height="100"
rx="12"
fill="#455a64"
stroke="#eceff1"
stroke-width="4"
/>

<line x1="880" y1="260" x2="880" y2="340"
stroke="#90a4ae" stroke-width="3"/>

<line x1="900" y1="260" x2="900" y2="340"
stroke="#90a4ae" stroke-width="3"/>

<line x1="920" y1="260" x2="920" y2="340"
stroke="#90a4ae" stroke-width="3"/>

<line x1="940" y1="260" x2="940" y2="340"
stroke="#90a4ae" stroke-width="3"/>

</g>

<!-- STATUS -->

<text
x="140"
y="450"
fill="#00e676"
font-size="28">
PUMP : ON
</text>

<text
x="140"
y="490"
fill="#00e676"
font-size="28">
VALVE : OPEN
</text>

</svg>

<script>

let level = 75;

setInterval(()=>{

    level += (Math.random()*10)-5;

    if(level>95) level=95;
    if(level<20) level=20;

    const h = level*2.5;

    document
        .getElementById("water")
        .setAttribute("height",h);

    document
        .getElementById("water")
        .setAttribute("y",370-h);

    document
        .getElementById("levelText")
        .textContent=Math.round(level)+"%";

},2000);

</script>

</body>
</html>
